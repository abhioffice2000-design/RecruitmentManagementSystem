<div class="page-container animate-fade-in">
  <div class="page-header">
    <div>
      <h1 class="page-title">My Team</h1>
      <p class="page-subtitle">View your direct reports and their current status.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" (click)="openAddModal()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px; height:16px; margin-right: 0.5rem">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add Team Member
      </button>
    </div>
  </div>

  <div class="card glass-panel">
    <table class="enterprise-table w-full text-left">
      <thead>
        <tr>
          <th class="p-4 border-b">Team Member</th>
          <th class="p-4 border-b">Role</th>
          <th class="p-4 border-b">Status</th>
          <th class="p-4 border-b">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let member of teamMembers">
          <td class="p-4 border-b border-light">
            <div class="flex items-center gap-3">
              <div class="avatar-sm bg-primary text-white rounded-full w-8 h-8 flex items-center justify-center font-bold">
                {{ member.name.charAt(0) }}
              </div>
              <div>
                <div class="font-medium text-main">{{ member.name }}</div>
                <div class="text-xs text-muted">{{ member.email }}</div>
              </div>
            </div>
          </td>
          <td class="p-4 border-b border-light text-main">{{ member.role }}</td>
          <td class="p-4 border-b border-light">
            <span class="badge" 
                  [class.badge-success]="member.status === 'Online'"
                  [class.badge-warning]="member.status === 'In Meeting'"
                  [class.badge-muted]="member.status === 'Offline'">
              {{ member.status }}
            </span>
          </td>
           <td class="p-4 border-b border-light">
              <button class="text-primary text-sm font-medium mr-4 hover:underline">View Profile</button>
           </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add Team Member Modal -->
<div class="modal-overlay" *ngIf="showAddModal">
  <div class="modal-content animate-fade-in glass-panel">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
        </div>
        <div>
          <h2>Add Team Member</h2>
          <p class="modal-subtitle">Add a new member to your direct reports.</p>
        </div>
      </div>
      <button class="btn-icon" (click)="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    
    <div class="modal-body">
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="newMember.name" placeholder="Enter team member's full name" />
      </div>
      
      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <input type="email" class="form-control" [(ngModel)]="newMember.email" placeholder="member@company.com" />
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Role / Position <span class="required">*</span></label>
          <select class="form-control" [(ngModel)]="newMember.role">
            <option value="" disabled selected>Select a role...</option>
            <option value="Senior Frontend Dev">Senior Frontend Dev</option>
            <option value="Backend Engineer">Backend Engineer</option>
            <option value="Product Manager">Product Manager</option>
            <option value="UI/UX Designer">UI/UX Designer</option>
            <option value="DevOps Engineer">DevOps Engineer</option>
            <option value="QA Engineer">QA Engineer</option>
            <option value="Data Scientist">Data Scientist</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Department</label>
          <input type="text" class="form-control" [(ngModel)]="newMember.department" placeholder="e.g. Engineering" />
        </div>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn outline-btn" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="saveMember()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px; height:16px; margin-right: 0.5rem">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add Member
      </button>
    </div>
  </div>
</div>
